<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — GIRMA PRIME</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="bg-sage font-sans antialiased min-h-screen flex items-center justify-center">
  <div class="grain-overlay" aria-hidden="true"></div>

  <div class="w-full max-w-md mx-auto px-6">
    <!-- Logo -->
    <div class="text-center mb-10 fade-up">
      <a href="/" class="inline-flex flex-col items-center leading-none">
        <span class="font-display text-3xl font-bold text-forest tracking-widest uppercase">Girma Prime</span>
        <span class="font-sans text-xs text-moss tracking-[0.25em] uppercase mt-1">Admin Portal</span>
      </a>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-xl p-10 fade-up" style="animation-delay:.15s">
      <h1 class="font-display text-2xl text-forest mb-2">Welcome back.</h1>
      <p class="font-sans text-sm text-moss mb-8">Sign in to manage orders and inventory.</p>

      {% if error %}
      <div class="mb-6 p-4 rounded-xl bg-red-50 border border-red-200">
        <p class="font-sans text-sm text-red-700">{{ error }}</p>
      </div>
      {% endif %}

      <form method="POST" action="/login" novalidate>
        <div class="field-group mb-5">
          <label for="username" class="field-label">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            class="field-input"
            placeholder="girma_admin"
            autocomplete="username"
            required
            autofocus
          />
        </div>
        <div class="field-group mb-8">
          <label for="password" class="field-label">Password</label>
          <div class="relative">
            <input
              type="password"
              id="password"
              name="password"
              class="field-input pr-12"
              placeholder="••••••••••••"
              autocomplete="current-password"
              required
            />
            <button
              type="button"
              id="togglePwd"
              class="absolute right-4 top-1/2 -translate-y-1/2 text-moss hover:text-forest transition-colors"
              aria-label="Toggle password visibility"
            >
              <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg id="eyeOffIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="hidden">
                <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn-primary w-full">Sign In</button>
      </form>
    </div>

    <p class="text-center mt-6 fade-up" style="animation-delay:.3s">
      <a href="/" class="font-sans text-xs text-moss hover:text-forest transition-colors">← Back to storefront</a>
    </p>
  </div>

  <script>
    // Password show/hide toggle
    const pwd = document.getElementById('password');
    const btn = document.getElementById('togglePwd');
    const eyeOn = document.getElementById('eyeIcon');
    const eyeOff = document.getElementById('eyeOffIcon');
    btn.addEventListener('click', () => {
      const visible = pwd.type === 'text';
      pwd.type = visible ? 'password' : 'text';
      eyeOn.classList.toggle('hidden', !visible);
      eyeOff.classList.toggle('hidden', visible);
    });
  </script>
</body>
</html>
